name: Run Code Tests Automatically

on: [push]

jobs:
  run-tests:
    runs-on: ubuntu-latest 

    steps:
    - name: Check out our code
      uses: actions/checkout@v3

    - name: Set up Python on the server
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Run our automated test script
      run: |
        python -m pytest test_app.py || python test_app.py
